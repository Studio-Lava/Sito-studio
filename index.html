<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Lava - Consulente del Lavoro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            overflow: hidden;
            background-color: #FDFCF9;
        }

        .scroll-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            justify-content: center;
            align-items: center;
            /* AGGIUNTO: Spazio di sicurezza ai bordi per non tagliare i titoli */
            padding: 5vh 20px; 
            background-color: #FDFCF9;
            position: relative;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            /* Mantiene la nitidezza dei testi */
            image-rendering: -webkit-optimize-contrast;
        }

        .footer-content {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 11px;
            color: #666;
            background: rgba(253, 252, 249, 0.9);
            padding: 15px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <section><img src="sitopag1.png" alt="Home"></section>
        <section><img src="sitopag2.png" alt="Perché scegliere lo Studio"></section>
        <section><img src="sitopag3.png" alt="Chi Siamo"></section>
        <section><img src="sitopag4.png" alt="Servizi Offerti"></section>
        
        <section>
            <img src="sitopag5.png" alt="Contatti">
            <div class="footer-content">
                <strong>Studio Lava di Giovanni Lava</strong> | Corso Francia 335, Torino | P.IVA 11090330013 | Iscr. Albo n. 1658
            </div>
        </section>
    </div>

</body>
</html>
