<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Lava - Consulente del Lavoro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            background-color: #FDFCF9;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* --- VERSIONE COMPUTER --- */
        @media (min-width: 769px) {
            .scroll-container {
                height: 100vh;
                overflow-y: scroll;
                scroll-snap-type: y mandatory;
                scroll-behavior: smooth;
            }
            section {
                height: 100vh;
                width: 100%;
                scroll-snap-align: start;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 40px;
                position: relative;
            }
            img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }
            .footer-content {
                position: absolute;
                bottom: 0;
                width: 100%;
                background: rgba(253, 252, 249, 0.9);
                padding: 15px;
                border-top: 1px solid #eee;
            }
        }

        /* --- VERSIONE MOBILE (SMARTPHONE) --- */
        @media (max-width: 768px) {
            section {
                width: 100%;
                background-color: #FDFCF9;
                padding: 0;
                border-bottom: 2px solid #eee; /* Separa le pagine */
            }
            img {
                width: 100%; /* L'immagine prende tutta la larghezza */
                height: auto; /* L'altezza si adatta diventando molto lunga */
                display: block;
                image-rendering: -webkit-optimize-contrast;
            }
            .footer-content {
                padding: 30px 15px;
                background: #FDFCF9;
                font-size: 13px;
                border-top: 2px solid #8B2C32; /* Un tocco di bordeaux dello studio */
            }
        }

        img { display: block; margin: 0 auto; }
        .footer-content { text-align: center; color: #333; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="scroll-container">
        <section><img src="sitopag1.png" alt="Studio Lava - Home"></section>
        <section><img src="sitopag2.png" alt="Perché scegliere lo Studio Lava"></section>
        <section><img src="sitopag3.png" alt="Chi Siamo - Dott. Giovanni Lava"></section>
        <section><img src="sitopag4.png" alt="Servizi Offerti dallo Studio"></section>
        
        <section>
            <img src="sitopag5.png" alt="Contatti Studio Lava Torino">
            <div class="footer-content">
                <strong>Studio Lava di Giovanni Lava</strong><br>
                Corso Francia 335, Torino<br>
                P.IVA 11011470017 | Iscr. Albo n. 1752
            </div>
        </section>
    </div>

</body>
</html>
