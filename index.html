<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Lava - Consulente del Lavoro</title>
    <style>
        /* Reset totale per non avere margini */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Forza la pagina ad agganciarsi alle sezioni e ad essere alta quanto lo schermo */
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            height: 100vh;
            overflow-y: scroll;
            background-color: #FDFCF9;
        }

        /* Configurazione delle sezioni a tutto schermo */
        section {
            width: 100%;
            height: 100vh; /* Altezza schermo intero */
            scroll-snap-align: start; /* Punti di aggancio dello scroll */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Le immagini si adattano al 'quadro' dello schermo */
        section img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ritaglia o allunga leggermente per riempire perfettamente lo schermo senza distorcere */
            display: block;
            border: none;
            /* Forza la nitidezza */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        /* Footer speciale che appare sopra l'ultima sezione (Contatti) */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            background: rgba(253, 252, 249, 0.95); /* Leggermente trasparente */
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
            color: #333;
            line-height: 1.6;
            border-top: 1px solid #e0e0e0;
            z-index: 10; /* Sopra l'immagine */
        }
    </style>
</head>
<body>

    <section>
        <img src="sitopag1.png" alt="Studio Lava - Home">
    </section>

    <section>
        <img src="sitopag2.png" alt="Perché Scegliere Studio Lava">
    </section>

    <section>
        <img src="sitopag3.png" alt="Chi Siamo - Team">
    </section>

    <section>
        <img src="sitopag4.png" alt="Servizi Offerti">
    </section>

    <section>
        <img src="sitopag5.png" alt="Contatti">
        <footer>
            <strong>Studio Lava di Giovanni Lava</strong><br>
            Corso Francia n. 335 - 10142 Torino (TO)<br>
            P.IVA: 11090330013 | Tel: 011.4051299 | Iscr. Albo n. 1658
        </footer>
    </section>

</body>
</html>
