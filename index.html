<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Lava - Consulente del Lavoro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #FDFCF9;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* --- VISUALIZZAZIONE PC --- */
        @media (min-width: 769px) {
            html, body { height: 100%; overflow: hidden; }
            .scroll-container {
                height: 100vh;
                overflow-y: scroll;
                scroll-snap-type: y mandatory;
                scroll-behavior: smooth;
            }
            section {
                height: 100vh;
                width: 100%;
                scroll-snap-align: start;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 40px;
                position: relative;
            }
            img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }
            .footer-content {
                position: absolute;
                bottom: 0;
                width: 100%;
                background: rgba(253, 252, 249, 0.9);
                padding: 15px;
                border-top: 1px solid #eee;
                text-align: center;
            }
        }

        /* --- VISUALIZZAZIONE MOBILE (NESSUN TAGLIO) --- */
        @media (max-width: 768px) {
            .scroll-container {
                display: block;
                background-color: #FDFCF9;
            }
            section {
                width: 100%;
                /* Aggiungiamo spazio sopra e sotto ogni immagine per separarle bene */
                padding: 30px 0; 
                display: flex;
                flex-direction: column;
                align-items: center;
                border-bottom: 1px solid #eee;
            }
            img {
                width: 100%; /* L'immagine occupa tutta la larghezza, senza tagli */
                height: auto;
                display: block;
                /* Massima nitidezza per i testi nelle immagini */
                image-rendering: -webkit-optimize-contrast;
            }
            .footer-content {
                padding: 40px 20px;
                text-align: center;
                font-size: 14px;
                background: #FDFCF9;
                color: #333;
            }
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <section><img src="sitopag1.png" alt="Studio Lava Home"></section>
        <section><img src="sitopag2.png" alt="Perché scegliere lo Studio Lava"></section>
        <section><img src="sitopag3.png" alt="Chi Siamo Giovanni Lava"></section>
        <section><img src="sitopag4.png" alt="Servizi Studio Lava"></section>
        
        <section>
            <img src="sitopag5.png" alt="Contatti Studio Lava">
            <div class="footer-content">
                <strong>Studio Lava di Giovanni Lava</strong><br>
                Corso Francia 335 - 10142 Torino<br>
                P.IVA 11011470017 | Iscr. Albo n. 1752
            </div>
        </section>
    </div>

</body>
</html>
