<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Lava - Consulente del Lavoro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            background-color: #FDFCF9;
        }

        /* Contenitore per lo scroll a scatto */
        .scroll-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px; 
            background-color: #FDFCF9;
            position: relative;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* --- OTTIMIZZAZIONE PER MOBILE --- */
        @media (max-width: 768px) {
            .scroll-container {
                scroll-snap-type: none; /* Disattiviamo lo scatto su mobile per una lettura più libera */
                height: auto;
                overflow-y: visible;
            }
            section {
                height: auto; /* La pagina si allunga quanto serve per far leggere il testo grande */
                min-height: 50vh;
                scroll-snap-align: none;
                padding: 20px 10px;
            }
            img {
                width: 100%; /* L'immagine occupa tutta la larghezza del telefono */
                height: auto;
                max-height: none;
            }
            .footer-content {
                position: relative; /* Il footer si mette in coda invece di coprire il testo */
                background: #FDFCF9;
                font-size: 12px;
            }
        }

        .footer-content {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 11px;
            color: #666;
            background: rgba(253, 252, 249, 0.9);
            padding: 15px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <section><img src="sitopag1.png" alt="Studio Lava - Home"></section>
        <section><img src="sitopag2.png" alt="Perché scegliere lo Studio Lava"></section>
        <section><img src="sitopag3.png" alt="Chi Siamo - Dott. Giovanni Lava"></section>
        <section><img src="sitopag4.png" alt="Servizi Offerti dallo Studio"></section>
        
        <section>
            <img src="sitopag5.png" alt="Contatti Studio Lava Torino">
            <div class="footer-content">
                <strong>Studio Lava di Giovanni Lava</strong> | Corso Francia 335, Torino | P.IVA 11011470017 | Iscr. Albo n. 1752
            </div>
        </section>
    </div>

</body>
</html>
