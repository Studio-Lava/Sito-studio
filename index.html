<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Lava - Consulente del Lavoro</title>
    <style>
        /* Reset e blocco dello scroll standard */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            overflow: hidden; /* Evitiamo scroll doppi */
            background-color: #FDFCF9;
        }

        /* Contenitore con effetto calamita (Snap) */
        .scroll-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* Attiva l'effetto calamita verticale */
            scroll-behavior: smooth;
        }

        /* Ogni sezione deve occupare esattamente lo schermo intero */
        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start; /* Punto di aggancio */
            scroll-snap-stop: always;  /* Forza l'aggancio a ogni singola pagina */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FDFCF9;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain; /* Mantiene l'immagine intera senza tagliarla */
            image-rendering: -webkit-optimize-contrast;
        }

        /* Footer all'interno dell'ultima sezione per non rompere lo scroll */
        .footer-content {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-family: sans-serif;
            font-size: 12px;
            color: #555;
            background: rgba(253, 252, 249, 0.8);
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <section>
            <img src="sitopag1.png" alt="Home">
        </section>

        <section>
            <img src="sitopag2.png" alt="Scegliere lo Studio">
        </section>

        <section>
            <img src="sitopag3.png" alt="Chi Siamo">
        </section>

        <section>
            <img src="sitopag4.png" alt="Servizi">
        </section>

        <section style="position: relative;">
            <img src="sitopag5.png" alt="Contatti">
            <div class="footer-content">
                <strong>Studio Lava di Giovanni Lava</strong> | Corso Francia n. 335 - 10142 Torino (TO)<br>
                P.IVA: 11090330013 | Tel: 011.4051299 | Iscr. Albo n. 1658
            </div>
        </section>
    </div>

</body>
</html>
